name: Build

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        name: [
          ubuntu-doc,
          ubuntu-gcc-9,
          ubuntu-gcc-10,
          ubuntu-clang-13-debug,
          ubuntu-gcc-11,
          ubuntu-clang-13-nofortran,
          ubuntu-clang-14-nofortran,
          macos-gcc-11,
          macos-clang-13,
          windows-msys2-gcc,
        ]

        include:
          - name: ubuntu-doc
            os: ubuntu-20.04
            compiler: clang
            version: "13"
            doc: "yes"
            arts: "no"
            fortran: "no"
            check: "no"
            libcxx: "yes"
            buildtype: "Release"

          - name: ubuntu-gcc-9
            os: ubuntu-20.04
            compiler: gcc
            version: "9"
            doc: "no"
            arts: "yes"
            fortran: "yes"
            fortran-version: "9"
            check: "yes"
            libcxx: "no"
            buildtype: "Release"

          - name: ubuntu-gcc-10
            os: ubuntu-20.04
            compiler: gcc
            version: "10"
            doc: "no"
            arts: "yes"
            fortran: "yes"
            fortran-version: "10"
            check: "yes"
            libcxx: "no"
            buildtype: "Release"

          - name: ubuntu-clang-13-debug
            os: ubuntu-20.04
            compiler: clang
            version: "13"
            doc: "no"
            arts: "yes"
            fortran: "yes"
            fortran-version: "11"
            check: "yes"
            libcxx: "yes"
            buildtype: "RelWithDebInfo"

          - name: ubuntu-gcc-11
            os: ubuntu-20.04
            compiler: gcc
            version: "11"
            doc: "no"
            arts: "yes"
            fortran: "yes"
            fortran-version: "11"
            check: "yes"
            libcxx: "no"
            buildtype: "Release"

          - name: ubuntu-clang-13-nofortran
            os: ubuntu-20.04
            compiler: clang
            version: "13"
            doc: "no"
            arts: "yes"
            fortran: "no"
            check: "yes"
            libcxx: "yes"
            buildtype: "Release"

          - name: ubuntu-clang-14-nofortran
            os: ubuntu-20.04
            compiler: clang
            version: "14"
            doc: "no"
            arts: "yes"
            fortran: "no"
            check: "yes"
            libcxx: "yes"
            buildtype: "Release"

          - name: macos-gcc-11
            os: macos-latest
            compiler: gcc
            version: "11"
            doc: "no"
            arts: "yes"
            fortran: "yes"
            fortran-version: "11"
            check: "yes"
            libcxx: "no"
            buildtype: "Release"

          - name: macos-clang-13
            os: macos-latest
            compiler: clang
            version: "13"
            doc: "no"
            arts: "yes"
            fortran: "no"
            check: "yes"
            libcxx: "no"
            buildtype: "Release"

          - name: windows-msys2-gcc
            os: windows-latest
            msystem: "MINGW64"
            install: mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-gcc mingw-w64-x86_64-openblas
            compiler: gcc
            doc: "no"
            arts: "yes"
            fortran: "no"
            check: "yes"
            libcxx: "no"
            buildtype: "Release"

    env:
      CMAKE_GENERATOR: Ninja

    steps:
      - uses: actions/checkout@v1
        with:
          fetch-depth: 10

      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          update: true
          msystem: ${{ matrix.msystem }}
          install: ${{ matrix.install }}

      - name: Set up Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Setup (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ] && [ "${{ matrix.version }}" -ge "13" ]; then
             sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 15CF4D18AF4F7421
             sudo add-apt-repository "deb http://apt.llvm.org/focal/ llvm-toolchain-focal-${{ matrix.version }} main"
          fi

          sudo apt-get update

          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++-${{ matrix.version }}
            echo "CC=gcc-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=g++-${{ matrix.version }}" >> $GITHUB_ENV
          fi

          if [ "${{ matrix.fortran }}" = "yes" ]; then
            sudo apt-get install -y gfortran-${{ matrix.fortran-version }}
            echo "FC=gfortran-${{ matrix.fortran-version }}" >> $GITHUB_ENV
            echo "USEFORTRAN=1" >> $GITHUB_ENV
          else
            echo "USEFORTRAN=0" >> $GITHUB_ENV
          fi

          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y libunwind-dev clang++-${{ matrix.version }}
            echo "CC=clang-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=clang++-${{ matrix.version }}" >> $GITHUB_ENV
          fi

          if [ "${{ matrix.libcxx }}" = "yes" ]; then
            sudo apt-get install -y libc++-${{ matrix.version }}-dev libc++abi-${{ matrix.version }}-dev
            echo "CXXFLAGS=-stdlib=libc++" >> $GITHUB_ENV
          fi
          sudo apt-get install -y python3-minimal python3-pip python3-setuptools zlib1g-dev libopenblas-dev libfftw3-dev ninja-build
          sudo pip3 install docutils lark-parser matplotlib netCDF4 numpy pytest scipy xarray

          if [ "${{ matrix.doc }}" = "yes" ]; then
            sudo apt-get install -y texlive texlive-latex-extra doxygen
            sudo pip3 install sphinx sphinx_rtd_theme
          fi


      - name: Setup (macOS)
        if: runner.os == 'macOS'
        run: |
          brew upgrade python
          brew install ninja
          sudo pip3 install docutils lark-parser matplotlib netCDF4 numpy pytest scipy xarray
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            brew install gcc@${{ matrix.version }}
            echo "CC=gcc-${{ matrix.version }}" >> $GITHUB_ENV
            echo "CXX=g++-${{ matrix.version }}" >> $GITHUB_ENV
          elif [ "${{ matrix.compiler }}" = "clang" ]; then
            brew install llvm@${{ matrix.version }}
            echo "CC=/usr/local/opt/llvm@${{ matrix.version }}/bin/clang" >> $GITHUB_ENV
            echo "CXX=/usr/local/opt/llvm@${{ matrix.version }}/bin/clang++" >> $GITHUB_ENV
            if [ "${{ matrix.fortran }}" = "yes" ]; then
              brew install gcc@${{ matrix.fortran-version }}
            fi
          else
            exit 1
          fi

          if [ "${{ matrix.fortran }}" = "yes" ]; then
            echo "FC=gfortran-${{ matrix.fortran-version }}" >> $GITHUB_ENV
            echo "USEFORTRAN=1" >> $GITHUB_ENV
          else
            echo "USEFORTRAN=0" >> $GITHUB_ENV
          fi

      - name: Setup (Windows)
        if: runner.os == 'Windows'
        run: |
          python3 -m pip install docutils lark-parser matplotlib netCDF4 numpy pytest scipy xarray

      - name: Configure (Linux / macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          mkdir cmake-build
          cd cmake-build
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }} -DENABLE_PCH=1 -DNUM_PYARTS_WSM=2 -DNUM_PYARTS_WSV=1 -DNUM_PYARTS_WSC=1 -DNUM_PYARTS_WSG=1 -DENABLE_FORTRAN=$USEFORTRAN ..

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir cmake-build
          cd cmake-build
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }} -DENABLE_PCH=1 -DNUM_PYARTS_WSM=2 -DNUM_PYARTS_WSV=1 -DNUM_PYARTS_WSC=1 -DNUM_PYARTS_WSG=1 -DENABLE_FORTRAN=$USEFORTRAN ..

      - name: Build (Linux / macOS)
        if: (runner.os == 'Linux' || runner.os == 'macOS') && matrix.arts == 'yes'
        run: |
          cd cmake-build
          cmake --build . -j2 --target 3rdparty/all
          cmake --build . -j2 --target arts
          cmake --build . -j1 --target pyarts_cpp
          cmake --build . -j2 --target src/all

      - name: Build (Windows)
        if: runner.os == 'Windows' && matrix.arts == 'yes'
        shell: msys2 {0}
        run: |
          cd cmake-build
          cmake --build . -j2 --target 3rdparty/all
          cmake --build . -j2 --target arts
          cmake --build . -j1 --target pyarts_cpp
          cmake --build . -j2 --target src/all

      - name: Docs (Linux / macOS / Windows)
        if: (runner.os == 'Linux' || runner.os == 'macOS' || runner.os == 'Windows') && matrix.doc == 'yes'
        run: |
          cd cmake-build
          cmake --build . -j2 --target 3rdparty/all
          cmake --build . -j2 --target arts
          cmake --build . -j1 --target pyarts_cpp
          cmake --build . -j2 --target doc/uguide/all
          cmake --build . -j2 --target doc/doxygen/all
          cmake --build . -j2 --target pyarts_docs

      - name: Check (Linux / macOS)
        if: (runner.os == 'Linux' || runner.os == 'macOS') && matrix.check == 'yes'
        run: |
          cd cmake-build
          cmake --build . -j1 --target check

      - name: Check (Windows)
        if: runner.os == 'Windows' && matrix.check == 'yes'
        shell: msys2 {0}
        run: |
          cd cmake-build
          cmake --build . -j1 --target check

      - name: Check Python (Linux / macOS)
        if: (runner.os == 'Linux' || runner.os == 'macOS') && matrix.check == 'yes'
        run: |
          cd cmake-build
          cmake --build . -j1 --target check-python

      - name: Check Python (Windows)
        if: (runner.os == 'Windows') && matrix.check == 'yes'
        shell: msys2 {0}
        run: |
          cd cmake-build
          cmake --build . -j1 --target check-python

